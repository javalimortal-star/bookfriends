# Fly.io config — run `fly launch --no-deploy` once, then `fly deploy`.
app = "bookfriends"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATA_DIR = "/data"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
